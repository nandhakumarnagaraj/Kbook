<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName kbook.iadv.cloud
    ServerAlias www.kbook.iadv.cloud

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Exclude pgAdmin
    ProxyPass /pgadmin4 !
    ProxyPassReverse /pgadmin4 !

    # CDN: serve uploaded WebP assets
    Alias /cdn/ /var/www/cdn.kbook.iadv.cloud/restaurants/
    <Directory /var/www/cdn.kbook.iadv.cloud/restaurants>
        Require all granted
        Header set Cache-Control "public, max-age=2592000, immutable"
        Options -Indexes +FollowSymLinks
    </Directory>

    # Debug APK direct download
    ProxyPass /kbook-debug.apk !
    Alias /kbook-debug.apk /var/www/kbook.iadv.cloud/kbook-debug.apk
    <Location /kbook-debug.apk>
        Header set Content-Disposition "attachment; filename=kbook-debug.apk"
        Header set Content-Type "application/vnd.android.package-archive"
    </Location>

    # Proxy API and actuator to Spring Boot
    ProxyPass /api/v1/ http://127.0.0.1:8081/api/v1/
    ProxyPassReverse /api/v1/ http://127.0.0.1:8081/api/v1/

    # Serve Angular web-admin dashboard
    DocumentRoot /var/www/kbook.iadv.cloud/web-admin/dist/khanabook-web-admin/browser

    <Directory /var/www/kbook.iadv.cloud/web-admin/dist/khanabook-web-admin/browser>
        Options -Indexes
        AllowOverride None
        Require all granted

        # Angular SPA: serve index.html for all routes (exclude /cdn/)
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_URI} ^/cdn/ [OR]
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]
        RewriteRule ^ index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/kbook_error.log
    CustomLog ${APACHE_LOG_DIR}/kbook_access.log combined

    SSLCertificateFile /etc/letsencrypt/live/kbook.iadv.cloud/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kbook.iadv.cloud/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>

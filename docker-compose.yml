services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend_v2

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      WHATSAPP_META_ACCESS_TOKEN: ${WHATSAPP_META_ACCESS_TOKEN}
      WHATSAPP_META_PHONE_NUMBER_ID: ${WHATSAPP_META_PHONE_NUMBER_ID}
      WHATSAPP_META_OTP_TEMPLATE_NAME: ${WHATSAPP_META_OTP_TEMPLATE_NAME}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://kbook.iadv.cloud}
      PAYMENT_CRYPTO_SECRET: ${PAYMENT_CRYPTO_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      CDN_BASE_PATH: ${CDN_BASE_PATH:-/var/www/cdn.kbook.iadv.cloud/restaurants/}
      CDN_URL_PREFIX: ${CDN_URL_PREFIX:-https://kbook.iadv.cloud/cdn/}
      CDN_TMP_PATH: ${CDN_TMP_PATH:-/var/www/cdn.kbook.iadv.cloud/tmp/}
      CWEBP_BIN: ${CWEBP_BIN:-cwebp}
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-true}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-true}
      EASEBUZZ_MERCHANT_KEY: ${EASEBUZZ_MERCHANT_KEY}
      EASEBUZZ_SALT: ${EASEBUZZ_SALT}
      EASEBUZZ_PAYMENT_BASE_URL: ${EASEBUZZ_PAYMENT_BASE_URL:-https://testpay.easebuzz.in}
      EASEBUZZ_DASHBOARD_BASE_URL: ${EASEBUZZ_DASHBOARD_BASE_URL:-https://testdashboard.easebuzz.in}
      EASEBUZZ_RETURN_URL: ${EASEBUZZ_RETURN_URL}
      EASEBUZZ_NOTIFY_URL: ${EASEBUZZ_NOTIFY_URL}
      EASEBUZZ_WEBHOOK_URL: ${EASEBUZZ_WEBHOOK_URL}
      EASEBUZZ_WIRE_BASE_URL: ${EASEBUZZ_WIRE_BASE_URL:-https://testdashboard.easebuzz.in}
      EASEBUZZ_WIRE_API_KEY: ${EASEBUZZ_WIRE_API_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      FIREBASE_REFRESH_TOKEN: ${FIREBASE_REFRESH_TOKEN}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    command: ["sh", "-c", "sleep 3 && java -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom -jar app.jar"]
    volumes:
      - /var/www/kbook.iadv.cloud.v2/server/uploads:/app/uploads
      - /var/www/cdn.kbook.iadv.cloud:/var/www/cdn.kbook.iadv.cloud
    ports:
      - "127.0.0.1:${SERVER_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/api/v2/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - backend_v2

networks:
  backend_v2:
    driver: bridge

volumes:
  pgdata_v2:

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api/v1
server.forward-headers-strategy=native

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HIKARICP POOL SETTINGS
# ===============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=KhanaBookHikariPool
spring.datasource.hikari.leak-detection-threshold=60000

# ===============================
# HIBERNATE / JPA SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# FLYWAY SETTINGS
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.default-schema=public
spring.flyway.schemas=public
spring.flyway.create-schemas=false

# ===============================
# SPRINGDOC OPENAPI PATHS
# ===============================
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/swagger-ui

# ===============================
# SECURITY & AUTH
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=2592000000

# ===============================
# GOOGLE API
# ===============================
google.client.id=${GOOGLE_CLIENT_ID}

# ===============================
# WHATSAPP OTP / META CLOUD API
# ===============================
whatsapp.meta.access-token=${WHATSAPP_META_ACCESS_TOKEN:}
whatsapp.meta.phone-number-id=${WHATSAPP_META_PHONE_NUMBER_ID:}
whatsapp.meta.otp-template-name=${WHATSAPP_META_OTP_TEMPLATE_NAME:}

# ===============================
# MULTIPART / UPLOAD LIMITS
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# ===============================
# STORAGE & OCR CONFIG
# ===============================
storage.upload-dir=uploads
jobs.cleanup.cron=0 0 * * * *
debug.ndjson.enabled=${DEBUG_LOG_ENABLED:false}
debug.ndjson.path=${DEBUG_LOG_PATH:logs/debug.log}

# ===============================
# ACTUATOR / HEALTH CHECKS
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.info.env.enabled=true
info.app.name=KhanaBook SaaS
info.app.version=1.0.0

# ===============================
# LOGGING
# ===============================
logging.level.com.khanabook=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# JACKSON / SERIALIZATION FIX
# ===============================
spring.jackson.serialization.fail-on-empty-beans=false

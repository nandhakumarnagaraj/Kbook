# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8081
server.servlet.context-path=/api/v1
server.forward-headers-strategy=native

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HIKARICP POOL SETTINGS
# ===============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=KhanaBookHikariPool

# ===============================
# HIBERNATE / JPA SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ===============================
# FLYWAY SETTINGS
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

# ===============================
# SPRINGDOC OPENAPI PATHS
# ===============================
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/swagger-ui

# ===============================
# SECURITY & AUTH
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=36000000

# ===============================
# GOOGLE API
# ===============================
google.client.id=${GOOGLE_CLIENT_ID}

# ===============================
# WHATSAPP OTP / META CLOUD API
# ===============================
whatsapp.meta.access-token=${WHATSAPP_META_ACCESS_TOKEN:}
whatsapp.meta.phone-number-id=${WHATSAPP_META_PHONE_NUMBER_ID:}
whatsapp.meta.otp-template-name=${WHATSAPP_META_OTP_TEMPLATE_NAME}

# ===============================
# STORAGE & OCR CONFIG
# ===============================
storage.upload-dir=uploads
jobs.cleanup.cron=0 0 * * * *
debug.ndjson.enabled=${DEBUG_LOG_ENABLED:false}
debug.ndjson.path=${DEBUG_LOG_PATH:logs/debug.log}

# ===============================
# JACKSON / SERIALIZATION FIX
# ===============================
spring.jackson.serialization.fail-on-empty-beans=false

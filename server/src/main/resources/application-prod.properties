# ===============================
# PRODUCTION OVERRIDES
# Activated via: --spring.profiles.active=prod
# All secrets MUST come from environment variables — never hardcode here.
# ===============================

# ===============================
# LOGGING — structured JSON for log aggregation (Loki / ELK)
# ===============================
logging.pattern.console=
logging.structured.format.console=ecs

# Suppress noisy framework logs in production
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.com.khanabook=INFO

# ===============================
# JPA — never print SQL in production
# ===============================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# CORS — set allowed origins explicitly for browser clients
# Comma-separated, e.g.: https://app.khanabook.com,https://admin.khanabook.com
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ===============================
# SPRINGDOC — keep API docs off on production unless explicitly re-enabled
# ===============================
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}

# ===============================
# ACTUATOR — expose only health + prometheus; hide everything else
# ===============================
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never

# ===============================
# SERVER — enable compression, set connection limits
# ===============================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain
server.compression.min-response-size=1024
server.tomcat.max-connections=10000
server.tomcat.accept-count=200
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20

# ===============================
# CACHE-CONTROL — ensure API responses are not cached by proxies
# ===============================
spring.web.resources.add-mappings=false

name: Web Admin

on:
  push:
    branches: [main, v1]
    paths:
      - 'web-admin/**'
      - '.github/workflows/web-admin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web-admin/**'
      - '.github/workflows/web-admin.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-admin/package-lock.json
      - run: npm ci
      - run: npm run build
